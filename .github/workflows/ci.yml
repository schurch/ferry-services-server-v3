name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            stefanchurch/ferry-services:latest
            stefanchurch/ferry-services:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci
          ping: server

      - name: Upload compose and deploy script
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          APP_ROOT: /home/stefan/ferry-services-server-v3
        run: |
          set -euo pipefail
          DEPLOY_HOST="${DEPLOY_HOST:-server}"
          DEPLOY_USER="${DEPLOY_USER:-stefan}"
          tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$APP_ROOT/scripts'"
          tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" "cat > '$APP_ROOT/compose.yaml'" < compose.yaml
          tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" "cat > '$APP_ROOT/scripts/deploy-docker.sh'" < scripts/deploy-docker.sh

      - name: Deploy docker image
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          APP_ROOT: /home/stefan/ferry-services-server-v3
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY_HOST="${DEPLOY_HOST:-server}"
          DEPLOY_USER="${DEPLOY_USER:-stefan}"
          tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_ROOT='$APP_ROOT' IMAGE_TAG='${{ github.sha }}' DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' bash -s" <<'REMOTE'
          set -euo pipefail
          chmod +x "$APP_ROOT/scripts/deploy-docker.sh"
          "$APP_ROOT/scripts/deploy-docker.sh"
          REMOTE
